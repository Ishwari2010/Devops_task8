<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishwari's Web App</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 50px;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .name {
            font-size: 70px;
            font-weight: 900;
            color: #2c3e50;
            background: white;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <h1>✨ Welcome to</h1>

    <div class="name">ISHWARI</div>

    <div class="card">
        <p>This is your stylish web app 🚀</p>
        <button onclick="showMessage()">Click Me</button>
    </div>

    <script>
        function showMessage() {
            alert("Hello Ishwari! 👋 Your app looks amazing!");
        }
    </script>

</body>
</html>
